<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>AI FAQ Generator - Week 1</title>
		<link rel="stylesheet" href="css/style.css" />
	</head>
	<body>
		<main class="container">
			<h1>AI FAQ Generator</h1>

			<section class="input-area">
				<label for="topic">Topic / Title</label>
				<input id="topic" placeholder="e.g., Product X, Billing, Returns" />

				<label for="content">Content / Description</label>
				<textarea id="content" rows="8" placeholder="Paste article, product description, or enter details here..."></textarea>

				<div style="display:flex;gap:8px;align-items:center;margin-top:8px">
					<label for="num">Number of FAQs</label>
					<input id="num" type="number" min="1" max="20" value="5" style="width:80px" />
					<button id="generateBtn">Generate FAQs</button>
					<button id="copyAllBtn" class="copy-btn" style="background:#f3f4f6;color:#111">Copy All</button>
					<button id="exportJsonBtn" class="copy-btn" style="background:#f3f4f6;color:#111">Export JSON</button>
				</div>
			</section>

			<section class="output-area">
				<h2>Generated FAQs</h2>
				<div id="output">No output yet.</div>
			</section>
		</main>

		<script src="js/script.js"></script>
	</body>
</html>
